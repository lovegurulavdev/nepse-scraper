name: Daily NEPSE Data Scraper

on:
  schedule:
    # Runs every day at 6:30 PM Nepal time (12:45 UTC)
    - cron: '45 12 * * *'
  workflow_dispatch:  # This lets you run it manually

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run scraper
      run: python scrape_nepse.py
      
    - name: Commit and push if changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update data for $(date +'%Y-%m-%d')" && git push)
